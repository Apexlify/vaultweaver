<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#53a8b6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Decorative nodes (knowledge graph visual) -->
  <g opacity="0.15">
    <!-- Node connections -->
    <line x1="120" y1="80" x2="220" y2="140" stroke="#e94560" stroke-width="1.5"/>
    <line x1="220" y1="140" x2="180" y2="220" stroke="#53a8b6" stroke-width="1.5"/>
    <line x1="220" y1="140" x2="320" y2="100" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="680" y1="90" x2="750" y2="160" stroke="#e94560" stroke-width="1.5"/>
    <line x1="750" y1="160" x2="800" y2="110" stroke="#53a8b6" stroke-width="1.5"/>
    <line x1="750" y1="160" x2="720" y2="230" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="720" y1="230" x2="790" y2="250" stroke="#e94560" stroke-width="1.5"/>
    <!-- Nodes -->
    <circle cx="120" cy="80" r="5" fill="#e94560"/>
    <circle cx="220" cy="140" r="7" fill="#53a8b6"/>
    <circle cx="180" cy="220" r="4" fill="#7c3aed"/>
    <circle cx="320" cy="100" r="5" fill="#e94560"/>
    <circle cx="680" cy="90" r="4" fill="#53a8b6"/>
    <circle cx="750" cy="160" r="7" fill="#e94560"/>
    <circle cx="800" cy="110" r="5" fill="#7c3aed"/>
    <circle cx="720" cy="230" r="5" fill="#53a8b6"/>
    <circle cx="790" cy="250" r="4" fill="#e94560"/>
  </g>

  <!-- Accent line -->
  <rect x="300" y="108" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Main title -->
  <text x="450" y="100" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="52" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    Vaultweaver
  </text>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="16" fill="#8892a4" letter-spacing="4">
    KNOWLEDGE THAT COMPOUNDS
  </text>

  <!-- Bottom accent line -->
  <rect x="200" y="170" width="500" height="1" rx="0.5" fill="url(#accent)" opacity="0.3"/>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="12">
    <!-- Ingest -->
    <rect x="145" y="195" width="100" height="28" rx="14" fill="#e94560" opacity="0.15" stroke="#e94560" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="195" y="213" text-anchor="middle" fill="#e94560">Ingest</text>
    <!-- Compile -->
    <rect x="265" y="195" width="100" height="28" rx="14" fill="#53a8b6" opacity="0.15" stroke="#53a8b6" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="315" y="213" text-anchor="middle" fill="#53a8b6">Compile</text>
    <!-- Query -->
    <rect x="385" y="195" width="100" height="28" rx="14" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="435" y="213" text-anchor="middle" fill="#7c3aed">Query</text>
    <!-- Lint -->
    <rect x="505" y="195" width="100" height="28" rx="14" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="555" y="213" text-anchor="middle" fill="#f59e0b">Lint</text>
    <!-- Search -->
    <rect x="625" y="195" width="100" height="28" rx="14" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="675" y="213" text-anchor="middle" fill="#10b981">Search</text>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="265" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#6b7280">
    raw sources  --&gt;  LLM-compiled wiki  --&gt;  Obsidian graph
  </text>
</svg>
